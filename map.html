<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UFI Experiences Live Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0d3956;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100vw;
      height: 100vh;
      background: #0d3956;
    }

    .leaflet-container {
      background: #0d3956 !important;
    }

    .title-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 82px;
      background: #0d3956;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .title {
      color: #ffffff;
      font-size: 34px;
      font-weight: 400;
      text-align: center;
      letter-spacing: 0.2px;
    }

    .city-label {
      color: #ffffff;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0,0,0,0.75);
    }
  </style>
</head>

<body>

<div class="title-bar">
  <div class="title">Where do you want to go for the next UFI Experience?</div>
</div>

<div id="map"></div>

<script>
  const SUPABASE_URL = "https://bsmgmwljirnmreythnjl.supabase.co";

  const SUPABASE_ANON_KEY =
    "sb_publishable_kcnz-yl-MevIJ9MMavcMnw_L5DFO0cv";

  const db = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  const cities = {
    "Amsterdam, Netherlands": [52.3676, 4.9041],
    "Berlin, Germany": [52.5200, 13.4050],
    "Birmingham, United Kingdom": [52.4862, -1.8904],
    "Budapest, Hungary": [47.4979, 19.0402],
    "Copenhagen, Denmark": [55.6761, 12.5683],
    "Dublin, Ireland": [53.3498, -6.2603],
    "Edinburgh, United Kingdom": [55.9533, -3.1883],
    "Helsinki, Finland": [60.1699, 24.9384],
    "Lisbon, Portugal": [38.7223, -9.1393],
    "Ljubljana, Slovenia": [46.0569, 14.5058],
    "Lyon, France": [45.7640, 4.8357],
    "Madrid, Spain": [40.4168, -3.7038],
    "Milan, Italy": [45.4642, 9.1900],
    "Munich, Germany": [48.1351, 11.5820],
    "Paris, France": [48.8566, 2.3522],
    "Prague, Czech Republic": [50.0755, 14.4378],
    "Rotterdam, Netherlands": [51.9244, 4.4777],
    "Rome, Italy": [41.9028, 12.4964],
    "Stockholm, Sweden": [59.3293, 18.0686],
    "Valencia, Spain": [39.4699, -0.3763],
    "Warsaw, Poland": [52.2297, 21.0122]
  };

  const europeCountryNames = new Set([
    "Albania", "Andorra", "Austria", "Belarus", "Belgium",
    "Bosnia and Herzegovina", "Bulgaria", "Croatia", "Czechia",
    "Denmark", "Estonia", "Finland", "France", "Germany",
    "Greece", "Hungary", "Iceland", "Ireland", "Italy",
    "Kosovo", "Latvia", "Liechtenstein", "Lithuania", "Luxembourg",
    "Moldova", "Monaco", "Montenegro", "Netherlands", "North Macedonia",
    "Norway", "Poland", "Portugal", "Romania", "San Marino",
    "Serbia", "Slovakia", "Slovenia", "Spain", "Sweden",
    "Switzerland", "Ukraine", "United Kingdom", "Vatican", "Turkey"
  ]);

  const map = L.map("map", {
    zoomControl: false,
    attributionControl: false,
    dragging: false,
    scrollWheelZoom: false,
    doubleClickZoom: false,
    boxZoom: false,
    keyboard: false,
    tap: false
  });

  const europeBounds = [
    [38, -9],
    [58.5, 23]
  ];

  map.fitBounds(europeBounds, {
    paddingTopLeft: [0, 155],
    paddingBottomRight: [0, 0]
  });

  const markerLayers = {};

  function shortCity(city) {
    return city.split(",")[0];
  }

  function markerRadius(count) {
    if (count === 0) return 3.5;
    return Math.min(4 + count * 1.8, 22);
  }

  function renderMarkers(counts = {}) {
    Object.entries(cities).forEach(([city, latlng]) => {
      const count = counts[city] || 0;
      const radius = markerRadius(count);

      if (markerLayers[city]) {
        markerLayers[city].forEach(layer => map.removeLayer(layer));
      }

      const circle = L.circleMarker(latlng, {
        radius: radius,
        color: "#79BD43",
        fillColor: "#79BD43",
        fillOpacity: 0.95,
        weight: 0
      }).addTo(map);

      const layers = [circle];

      if (count > 0) {
        const label = L.marker(latlng, {
          interactive: false,
          icon: L.divIcon({
            className: "",
            html: `<div class="city-label">${shortCity(city)}</div>`,
            iconSize: [100, 20],
            iconAnchor: [-8, -18]
          })
        }).addTo(map);

        layers.push(label);
      }

      markerLayers[city] = layers;
    });
  }

  async function loadEuropeMap() {
    const response = await fetch(
      "https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json"
    );

    const world = await response.json();

    const countries = topojson.feature(
      world,
      world.objects.countries
    );

    const europeCountries = {
      type: "FeatureCollection",
      features: countries.features.filter(feature =>
        europeCountryNames.has(feature.properties.name)
      )
    };

    L.geoJSON(europeCountries, {
      style: {
        fillColor: "#ffffff",
        fillOpacity: 1,
        color: "#c9d1b3",
        weight: 0.75
      },
      interactive: false
    }).addTo(map);
  }

  async function loadVotes() {
    const { data, error } = await db
      .from("votes")
      .select("city");

    if (error) {
      console.error(error);
      renderMarkers({});
      return;
    }

    const counts = {};

    data.forEach(row => {
      if (cities[row.city]) {
        counts[row.city] = (counts[row.city] || 0) + 1;
      }
    });

    renderMarkers(counts);
  }

  async function init() {
    await loadEuropeMap();
    renderMarkers({});
    await loadVotes();

    db.channel("votes-live")
      .on(
        "postgres_changes",
        {
          event: "INSERT",
          schema: "public",
          table: "votes"
        },
        () => {
          loadVotes();
        }
      )
      .subscribe();
  }

  init();
</script>

</body>
</html>
